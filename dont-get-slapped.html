<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Don't Get Slapped</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a00;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  canvas {
    display: block;
    cursor: none;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 480);
  H = canvas.height = Math.min(window.innerHeight, 800);
}
resize();
window.addEventListener('resize', resize);

// ── Audio ──────────────────────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audio = null;

function initAudio() {
  if (audio) return;
  audio = new AudioCtx();
}

// Buzz: mosquito wing hum (oscillator loop)
let buzzNode = null, buzzGain = null;

function startBuzz() {
  if (!audio) return;
  stopBuzz();
  buzzGain = audio.createGain();
  buzzGain.gain.setValueAtTime(0.07, audio.currentTime);
  buzzGain.connect(audio.destination);

  // Two detuned oscillators for a richer insect buzz
  [220, 330].forEach(freq => {
    const osc = audio.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, audio.currentTime);
    // Vibrato
    const lfo = audio.createOscillator();
    const lfoGain = audio.createGain();
    lfo.frequency.setValueAtTime(28, audio.currentTime);
    lfoGain.gain.setValueAtTime(8, audio.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start();
    osc.connect(buzzGain);
    osc.start();
    // store for cleanup
    if (!buzzNode) buzzNode = [];
    buzzNode.push(osc, lfo);
  });
}

function stopBuzz() {
  if (buzzNode) {
    buzzNode.forEach(n => { try { n.stop(); } catch(e){} });
    buzzNode = null;
  }
  if (buzzGain) {
    buzzGain.disconnect();
    buzzGain = null;
  }
}

// Whoosh: hand incoming warning
function playWhoosh() {
  if (!audio) return;
  const t = audio.currentTime;
  const buf = audio.createBuffer(1, audio.sampleRate * 0.25, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
  const src = audio.createBufferSource();
  src.buffer = buf;
  const filter = audio.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(800, t);
  filter.frequency.exponentialRampToValueAtTime(200, t + 0.25);
  filter.Q.setValueAtTime(2, t);
  const g = audio.createGain();
  g.gain.setValueAtTime(0.25, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  src.connect(filter); filter.connect(g); g.connect(audio.destination);
  src.start(t);
}

// SLAP: percussive hit
function playSlap() {
  if (!audio) return;
  const t = audio.currentTime;
  // Low thud
  const osc = audio.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.15);
  const g1 = audio.createGain();
  g1.gain.setValueAtTime(1.0, t);
  g1.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
  osc.connect(g1); g1.connect(audio.destination);
  osc.start(t); osc.stop(t + 0.2);

  // Crack (white noise burst)
  const buf = audio.createBuffer(1, audio.sampleRate * 0.08, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audio.createBufferSource();
  src.buffer = buf;
  const g2 = audio.createGain();
  g2.gain.setValueAtTime(0.6, t);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
  src.connect(g2); g2.connect(audio.destination);
  src.start(t);
}

// Near-miss: a quick high ping
function playNearMiss() {
  if (!audio) return;
  const t = audio.currentTime;
  const osc = audio.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1400, t);
  osc.frequency.exponentialRampToValueAtTime(600, t + 0.12);
  const g = audio.createGain();
  g.gain.setValueAtTime(0.15, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  osc.connect(g); g.connect(audio.destination);
  osc.start(t); osc.stop(t + 0.15);
}

// Game state
let state = 'start'; // 'start', 'play', 'over'
let score = 0;
let startTime = 0;
let shakeTimer = 0;
let shakeAmt = 0;

// Mosquito
const mq = {
  x: 200, y: 300,
  tx: 200, ty: 300,
  r: 9,
  wingAnim: 0
};

// Hands
let hands = [];
let spawnTimer = 0;
let spawnInterval = 120; // frames
let difficulty = 0;

// Particles
let particles = [];

// Mouse/touch tracking
let mx = 200, my = 300;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mx = e.clientX - rect.left;
  my = e.clientY - rect.top;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  mx = e.touches[0].clientX - rect.left;
  my = e.touches[0].clientY - rect.top;
}, { passive: false });

canvas.addEventListener('click', () => {
  initAudio();
  if (state === 'start' || state === 'over') startGame();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  const rect = canvas.getBoundingClientRect();
  mx = e.touches[0].clientX - rect.left;
  my = e.touches[0].clientY - rect.top;
  if (state === 'start' || state === 'over') startGame();
}, { passive: false });

function startGame() {
  state = 'play';
  score = 0;
  startTime = Date.now();
  hands = [];
  particles = [];
  spawnTimer = 0;
  spawnInterval = 120;
  difficulty = 0;
  mq.x = W / 2;
  mq.y = H / 2;
  mq.tx = W / 2;
  mq.ty = H / 2;
  mx = W / 2;
  my = H / 2;
  startBuzz();
}

// Hand states: 'wait', 'strike', 'hold', 'retract'
function spawnHand() {
  // Pick a random target near the mosquito with some randomness
  const spread = 80 + Math.random() * 60;
  const angle = Math.random() * Math.PI * 2;
  const tx = mq.x + Math.cos(angle) * (Math.random() * spread);
  const ty = mq.y + Math.sin(angle) * (Math.random() * spread);

  // Clamp target
  const cx = Math.max(40, Math.min(W - 40, tx));
  const cy = Math.max(60, Math.min(H - 60, ty));

  // Come from a random edge
  const edge = Math.floor(Math.random() * 4);
  let sx, sy;
  if (edge === 0) { sx = cx; sy = -120; }
  else if (edge === 1) { sx = cx; sy = H + 120; }
  else if (edge === 2) { sx = -120; sy = cy; }
  else { sx = W + 120; sy = cy; }

  const strikeSpeed = 18 + difficulty * 2.5;
  const waitFrames = 30 + Math.floor(Math.random() * 40) - difficulty * 3;

  hands.push({
    x: sx, y: sy,
    tx: cx, ty: cy,
    sx, sy,
    state: 'wait',
    waitTimer: Math.max(10, waitFrames),
    strikeSpeed,
    holdTimer: 0,
    retractTimer: 0,
    alpha: 1,
    scale: 1,
    angle: Math.atan2(cy - sy, cx - sx),
    hit: false,
    whooshed: false
  });
  playWhoosh();
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      color,
      r: 2 + Math.random() * 3
    });
  }
}

function drawMosquito(x, y, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha || 1;
  ctx.translate(x, y);

  const wingFlap = Math.sin(mq.wingAnim) * 0.4;

  // Wings
  ctx.save();
  ctx.rotate(-0.3 + wingFlap);
  ctx.fillStyle = 'rgba(180,220,255,0.55)';
  ctx.strokeStyle = 'rgba(120,180,220,0.7)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.ellipse(-7, -4, 10, 5, -0.5, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.rotate(0.3 - wingFlap);
  ctx.fillStyle = 'rgba(180,220,255,0.55)';
  ctx.strokeStyle = 'rgba(120,180,220,0.7)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.ellipse(7, -4, 10, 5, 0.5, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // Body
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(0, 0, 5, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -10, 5, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ff2200';
  ctx.beginPath();
  ctx.arc(2, -11, 1.5, 0, Math.PI * 2);
  ctx.fill();

  // Proboscis
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(0, -14);
  ctx.lineTo(0, -22);
  ctx.stroke();

  // Legs
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 0.8;
  for (let i = -1; i <= 1; i += 1) {
    ctx.beginPath();
    ctx.moveTo(i * 3, i * 3);
    ctx.lineTo(i * 3 - 10, i * 3 + 6);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-i * 3, i * 3);
    ctx.lineTo(-i * 3 + 10, i * 3 + 6);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHand(h) {
  ctx.save();
  ctx.globalAlpha = h.alpha;
  ctx.translate(h.x, h.y);
  ctx.rotate(h.angle + Math.PI / 2);
  ctx.scale(h.scale, h.scale);

  const skin = '#f5c09a';
  const dark = '#d4956a';
  const line = '#c07040';

  // Palm
  ctx.fillStyle = skin;
  ctx.strokeStyle = line;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(-22, -10, 44, 38, 8);
  ctx.fill();
  ctx.stroke();

  // Thumb
  ctx.beginPath();
  ctx.roundRect(-32, 0, 14, 22, 7);
  ctx.fill();
  ctx.stroke();

  // Fingers
  const fingers = [
    { x: -16, w: 11 },
    { x: -5,  w: 12 },
    { x: 7,   w: 11 },
    { x: 18,  w: 10 }
  ];
  for (const f of fingers) {
    ctx.beginPath();
    ctx.roundRect(f.x, -32, f.w, 30, 5);
    ctx.fill();
    ctx.stroke();
  }

  // Knuckle lines
  ctx.strokeStyle = dark;
  ctx.lineWidth = 1;
  for (const f of fingers) {
    ctx.beginPath();
    ctx.moveTo(f.x + 2, -14);
    ctx.lineTo(f.x + f.w - 2, -14);
    ctx.stroke();
  }

  // Palm lines
  ctx.beginPath();
  ctx.moveTo(-10, 8);
  ctx.quadraticCurveTo(0, 18, 10, 8);
  ctx.stroke();

  ctx.restore();
}

function lerp(a, b, t) { return a + (b - a) * t; }
function dist(ax, ay, bx, by) {
  return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
}

let frame = 0;

function update() {
  if (state !== 'play') return;

  frame++;
  mq.wingAnim += 0.5;

  // Difficulty ramp
  const elapsed = (Date.now() - startTime) / 1000;
  score = Math.floor(elapsed);
  difficulty = elapsed / 30; // max around 30s baseline
  spawnInterval = Math.max(35, 120 - difficulty * 60);

  // Mosquito follows mouse smoothly
  mq.tx = mx;
  mq.ty = my;
  mq.x = lerp(mq.x, mq.tx, 0.14);
  mq.y = lerp(mq.y, mq.ty, 0.14);

  // Spawn hands
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnTimer = 0;
    spawnHand();
    if (difficulty > 1 && Math.random() < 0.3) spawnHand();
  }

  // Update hands
  for (let i = hands.length - 1; i >= 0; i--) {
    const h = hands[i];

    if (h.state === 'wait') {
      h.waitTimer--;
      // Hover slightly
      h.x = lerp(h.x, h.tx, 0.04);
      h.y = lerp(h.y, h.ty, 0.04);
      if (h.waitTimer <= 0) h.state = 'strike';
    } else if (h.state === 'strike') {
      const dx = h.tx - h.x;
      const dy = h.ty - h.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < h.strikeSpeed) {
        h.x = h.tx;
        h.y = h.ty;
        h.state = 'hold';
        h.holdTimer = 18;
        // Check collision
        if (!h.hit && dist(h.x, h.y, mq.x, mq.y) < mq.r + 28) {
          playSlap();
          gameOver();
          return;
        } else {
          // Near miss sound if mosquito was close
          if (dist(h.x, h.y, mq.x, mq.y) < 60) playNearMiss();
        }
      } else {
        h.x += (dx / d) * h.strikeSpeed;
        h.y += (dy / d) * h.strikeSpeed;
      }
    } else if (h.state === 'hold') {
      h.holdTimer--;
      if (h.holdTimer <= 0) {
        h.state = 'retract';
        h.retractTimer = 30;
      }
    } else if (h.state === 'retract') {
      h.x = lerp(h.x, h.sx, 0.1);
      h.y = lerp(h.y, h.sy, 0.1);
      h.alpha = lerp(h.alpha, 0, 0.08);
      h.retractTimer--;
      if (h.retractTimer <= 0) {
        hands.splice(i, 1);
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Screen shake decay
  if (shakeTimer > 0) {
    shakeTimer--;
    shakeAmt = shakeTimer * 0.5;
  }
}

function gameOver() {
  state = 'over';
  stopBuzz();
  shakeTimer = 25;
  shakeAmt = 12;
  spawnParticles(mq.x, mq.y, '#ff4400', 20);
  spawnParticles(mq.x, mq.y, '#ffcc00', 12);
}

// Drawing helpers
function drawBg() {
  // Warm indoor light feel
  const grad = ctx.createRadialGradient(W/2, H/2, 50, W/2, H/2, Math.max(W, H));
  grad.addColorStop(0, '#fff8e8');
  grad.addColorStop(1, '#f0d8b0');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid / wallpaper
  ctx.strokeStyle = 'rgba(180,140,80,0.12)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 30) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawStartScreen() {
  drawBg();

  // Title shadow
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8b4513';
  ctx.font = 'bold 38px Georgia, serif';
  ctx.fillText("DON'T GET", W/2+2, H/2 - 78);
  ctx.font = 'bold 52px Georgia, serif';
  ctx.fillText("SLAPPED!", W/2+2, H/2 - 32);

  // Title
  ctx.fillStyle = '#cc2200';
  ctx.font = 'bold 38px Georgia, serif';
  ctx.fillText("DON'T GET", W/2, H/2 - 80);
  ctx.fillStyle = '#ff3300';
  ctx.font = 'bold 52px Georgia, serif';
  ctx.fillText("SLAPPED!", W/2, H/2 - 34);

  // Mosquito demo
  drawMosquito(W/2, H/2 + 30);

  // Instruction
  ctx.fillStyle = '#7a4020';
  ctx.font = '18px Georgia, serif';
  ctx.fillText('Move your mouse / finger', W/2, H/2 + 90);
  ctx.fillText('to dodge the hands!', W/2, H/2 + 115);

  // Button
  const bx = W/2 - 80, by = H/2 + 145, bw = 160, bh = 48;
  ctx.fillStyle = '#cc2200';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Georgia, serif';
  ctx.fillText('PLAY', W/2, by + 32);

  // Hand decor
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.translate(W - 40, 60);
  ctx.rotate(0.5);
  ctx.scale(0.7, 0.7);
  drawHandRaw();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.13;
  ctx.translate(50, H - 80);
  ctx.rotate(-0.3);
  ctx.scale(0.6, 0.6);
  drawHandRaw();
  ctx.restore();
}

function drawHandRaw() {
  const skin = '#f5c09a';
  const line = '#c07040';
  ctx.fillStyle = skin; ctx.strokeStyle = line; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(-22, -10, 44, 38, 8); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(-32, 0, 14, 22, 7); ctx.fill(); ctx.stroke();
  const ff = [{ x: -16, w: 11 }, { x: -5, w: 12 }, { x: 7, w: 11 }, { x: 18, w: 10 }];
  for (const f of ff) {
    ctx.beginPath(); ctx.roundRect(f.x, -32, f.w, 30, 5); ctx.fill(); ctx.stroke();
  }
}

function drawHUD() {
  // Score
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.roundRect(8, 8, 120, 40, 8);
  ctx.fill();

  ctx.fillStyle = '#4a1a00';
  ctx.font = 'bold 14px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText('SURVIVAL', 18, 24);
  ctx.font = 'bold 22px Georgia, serif';
  ctx.fillText(score + 's', 18, 43);

  // Danger meter
  const danger = Math.min(1, difficulty / 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.roundRect(W - 118, 8, 110, 40, 8);
  ctx.fill();
  ctx.fillStyle = '#4a1a00';
  ctx.font = '11px Georgia, serif';
  ctx.textAlign = 'right';
  ctx.fillText('DANGER', W - 12, 22);
  const barX = W - 108, barY = 28, barW = 96, barH = 12;
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 4);
  ctx.fill();
  const col = danger < 0.5 ? `rgb(${Math.floor(danger*2*200+55)},180,20)` : `rgb(255,${Math.floor((1-danger)*2*180)},0)`;
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW * danger, barH, 4);
  ctx.fill();
}

function drawGameOver() {
  drawBg();

  // Hands in background
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.translate(W/2 + 80, H/2 - 40);
  ctx.rotate(0.8);
  ctx.scale(1.5, 1.5);
  drawHandRaw();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.translate(W/2 - 100, H/2 + 20);
  ctx.rotate(-0.4);
  ctx.scale(1.3, 1.3);
  drawHandRaw();
  ctx.restore();

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.textAlign = 'center';

  // SLAPPED label
  ctx.fillStyle = '#cc2200';
  ctx.font = 'bold 54px Georgia, serif';
  ctx.shadowColor = '#ff6600';
  ctx.shadowBlur = 10;
  ctx.fillText('SLAPPED!', W/2, H/2 - 90);
  ctx.shadowBlur = 0;

  // Score
  ctx.fillStyle = '#4a1a00';
  ctx.font = '22px Georgia, serif';
  ctx.fillText('You survived for', W/2, H/2 - 42);
  ctx.fillStyle = '#cc2200';
  ctx.font = 'bold 48px Georgia, serif';
  ctx.fillText(score + ' seconds', W/2, H/2 + 10);

  // Rating
  let rating = '';
  if (score < 5) rating = 'Easy pickings 🦟';
  else if (score < 15) rating = 'Not bad, bug!';
  else if (score < 30) rating = 'Slippery little thing!';
  else if (score < 60) rating = 'Master evader! 🏆';
  else rating = 'LEGENDARY MOSQUITO 👑';

  ctx.fillStyle = '#7a4020';
  ctx.font = 'italic 18px Georgia, serif';
  ctx.fillText(rating, W/2, H/2 + 54);

  // Restart button
  const bx = W/2 - 85, by = H/2 + 80, bw = 170, bh = 50;
  ctx.fillStyle = '#cc2200';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 10);
  ctx.fill();

  ctx.fillStyle = '#fff8e8';
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 3;
  ctx.font = 'bold 22px Georgia, serif';
  ctx.fillText('TRY AGAIN', W/2, by + 33);
  ctx.shadowBlur = 0;
}

function drawPlay() {
  drawBg();

  // Draw hands (behind)
  for (const h of hands) {
    if (h.state === 'wait') {
      // Warning shadow
      ctx.save();
      ctx.globalAlpha = 0.18 * h.alpha;
      ctx.fillStyle = '#ff2200';
      ctx.beginPath();
      ctx.arc(h.tx, h.ty, 32, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Pulsing target ring
      const pulse = 0.5 + 0.5 * Math.sin(frame * 0.2);
      ctx.save();
      ctx.globalAlpha = pulse * 0.35 * h.alpha;
      ctx.strokeStyle = '#ff2200';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(h.tx, h.ty, 28 + pulse * 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    drawHand(h);
  }

  // Mosquito
  drawMosquito(mq.x, mq.y);

  // Particles
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  drawHUD();
}

function render() {
  ctx.clearRect(0, 0, W, H);

  // Screen shake
  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    sx = (Math.random() - 0.5) * shakeAmt;
    sy = (Math.random() - 0.5) * shakeAmt;
    shakeAmt *= 0.88;
  }

  ctx.save();
  ctx.translate(sx, sy);

  if (state === 'start') drawStartScreen();
  else if (state === 'play') drawPlay();
  else if (state === 'over') drawGameOver();

  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// Polyfill roundRect if needed
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    r = Math.min(r, w/2, h/2);
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

loop();
</script>
