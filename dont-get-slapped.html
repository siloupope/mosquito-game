const canvas = document.getElementById('c');

// ─────────────────────────────────────────────
//  AUDIO ENGINE
// ─────────────────────────────────────────────
let AC = null;
function initAC() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }

function stopBuzz(fast) {
if (!AC || !buzzActive) return;
buzzActive = false;
const t = AC.currentTime, fade = fast ? 0.05 : 0.2;
if (buzzGain) {
buzzGain.gain.cancelScheduledValues(t);
buzzGain.gain.setValueAtTime(buzzGain.gain.value, t);
buzzGain.gain.linearRampToValueAtTime(0.001, t + fade);
const bg = buzzGain;
const bo = […buzzOscs];
setTimeout(() => {
bo.forEach(o => { try { o.stop(); } catch(e){} });
bg.disconnect();
}, (fade + 0.05) * 1000);
buzzGain = null; buzzOscs = [];
}
}

function setBuzzVol(v) {
if (!buzzGain || !buzzActive) return;
const t = AC.currentTime;
buzzGain.gain.cancelScheduledValues(t);
buzzGain.gain.setValueAtTime(buzzGain.gain.value, t);
buzzGain.gain.linearRampToValueAtTime(Math.max(0.001, v * 0.08), t + 0.07);
}

// ── Whoosh ──────────────────────────────────
function playWhoosh(pitch) {
if (!AC) return;
pitch = pitch || 1;
const t = AC.currentTime, len = 0.28;
const buf = AC.createBuffer(1, AC.sampleRate * len, AC.sampleRate);
const d = buf.getChannelData(0);
for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
const src = AC.createBufferSource(); src.buffer = buf;
const f = AC.createBiquadFilter(); f.type=‘bandpass’;
f.frequency.setValueAtTime(850*pitch,t);
f.frequency.exponentialRampToValueAtTime(160*pitch,t+len);
f.Q.setValueAtTime(2.5,t);
const g = AC.createGain();
g.gain.setValueAtTime(0.28,t);
g.gain.exponentialRampToValueAtTime(0.001,t+len);
src.connect(f); f.connect(g); g.connect(AC.destination);
src.start(t);
}

// ── Slap ────────────────────────────────────
function playSlap() {
if (!AC) return;
const t = AC.currentTime;
const osc = AC.createOscillator();
osc.frequency.setValueAtTime(200,t);
osc.frequency.exponentialRampToValueAtTime(35,t+0.18);
const g1 = AC.createGain();
g1.gain.setValueAtTime(1.0,t);
g1.gain.exponentialRampToValueAtTime(0.001,t+0.22);
osc.connect(g1); g1.connect(AC.destination);
osc.start(t); osc.stop(t+0.23);

const buf = AC.createBuffer(1, AC.sampleRate*0.09, AC.sampleRate);
const d = buf.getChannelData(0);
for (let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
const src = AC.createBufferSource(); src.buffer=buf;
const g2 = AC.createGain();
g2.gain.setValueAtTime(0.65,t);
g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
src.connect(g2); g2.connect(AC.destination); src.start(t);
}

// ── Near miss ───────────────────────────────
function playNearMiss() {
if (!AC) return;
const t = AC.currentTime;
const osc = AC.createOscillator();
osc.frequency.setValueAtTime(1500,t);
osc.frequency.exponentialRampToValueAtTime(500,t+0.1);
const g = AC.createGain();
g.gain.setValueAtTime(0.1,t);
g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
osc.connect(g); g.connect(AC.destination);
osc.start(t); osc.stop(t+0.13);
}

// ── Blood bag pickup ─────────────────────────
function playPickup() {
if (!AC) return;
const t = AC.currentTime;
[0,0.06,0.13].forEach((dt,i)=>{
const osc = AC.createOscillator();
osc.type=‘sine’;
osc.frequency.setValueAtTime([520,660,880][i], t+dt);
const g = AC.createGain();
g.gain.setValueAtTime(0.2,t+dt);
g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.18);
osc.connect(g); g.connect(AC.destination);
osc.start(t+dt); osc.stop(t+dt+0.2);
});
}

// ── Start jingle ─────────────────────────────
function playStart() {
if (!AC) return;
const t = AC.currentTime;
[[0,330],[0.1,440],[0.2,550],[0.3,660]].forEach(([dt,f])=>{
const osc = AC.createOscillator(); osc.type=‘square’;
osc.frequency.setValueAtTime(f,t+dt);
const g = AC.createGain();
g.gain.setValueAtTime(0.07,t+dt);
g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.17);
osc.connect(g); g.connect(AC.destination);
osc.start(t+dt); osc.stop(t+dt+0.2);
});
}

// ── Game over ────────────────────────────────
function playGameOver() {
if (!AC) return;
const t = AC.currentTime;
[[0,440],[0.18,330],[0.36,220],[0.54,165]].forEach(([dt,f])=>{
const osc = AC.createOscillator(); osc.type=‘sawtooth’;
osc.frequency.setValueAtTime(f,t+dt);
const g = AC.createGain();
g.gain.setValueAtTime(0.16,t+dt);
g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.22);
osc.connect(g); g.connect(AC.destination);
osc.start(t+dt); osc.stop(t+dt+0.24);
});
}

// ── Victory ──────────────────────────────────
function playVictory() {
if (!AC) return;
const t = AC.currentTime;
[[0,523],[0.1,659],[0.2,784],[0.32,1047],[0.46,880],[0.58,1047]].forEach(([dt,f])=>{
const osc = AC.createOscillator(); osc.type=‘sine’;
osc.frequency.setValueAtTime(f,t+dt);
const g = AC.createGain();
g.gain.setValueAtTime(0.18,t+dt);
g.gain.exponentialRampToValueAtTime(0.001,t+dt+0.22);
osc.connect(g); g.connect(AC.destination);
osc.start(t+dt); osc.stop(t+dt+0.25);
});
}

// ─────────────────────────────────────────────
//  GAME STATE
// ─────────────────────────────────────────────
const GAME_DURATION = 60;
const BAG_PTS       = 10;

let state      = ‘start’;
let score      = 0;
let bagsCount  = 0;
let survived   = false;
let startTime  = 0;
let timeLeft   = GAME_DURATION;
let shakeTimer = 0, shakeAmt = 0;
let frame      = 0;
let difficulty = 0;

const mq = { x:240, y:400, tx:240, ty:400, r:9, wingAnim:0, speed:0 };

let hands=[], handSpawnT=0, handInterval=130;
let bags=[],  bagSpawnT=0,  bagInterval=200;
let particles=[], floaters=[];

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
let mx=240, my=400;
canvas.addEventListener(‘mousemove’, e => {
const r=canvas.getBoundingClientRect();
mx=e.clientX-r.left; my=e.clientY-r.top;
});
canvas.addEventListener(‘touchmove’, e => {
e.preventDefault();
const r=canvas.getBoundingClientRect();
mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top;
},{passive:false});
function onInteract() { initAC(); if(state===‘start’||state===‘over’) startGame(); }
canvas.addEventListener(‘click’, onInteract);
canvas.addEventListener(‘touchstart’, e => {
e.preventDefault();
const r=canvas.getBoundingClientRect();
mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top;
onInteract();
},{passive:false});

// ─────────────────────────────────────────────
//  GAME FLOW
// ─────────────────────────────────────────────
function startGame() {
state=‘play’; score=0; bagsCount=0; survived=false;
startTime=Date.now(); timeLeft=GAME_DURATION;
hands=[]; bags=[]; particles=[]; floaters=[];
handSpawnT=0; bagSpawnT=0;
handInterval=130; bagInterval=200;
difficulty=0; frame=0;
mq.x=W/2; mq.y=H/2; mq.tx=W/2; mq.ty=H/2; mx=W/2; my=H/2;
mq.speed=0;
playStart();
}

function endGame(won) {
state=‘over’; survived=won;
stopBuzz(true);
if (!won) { shakeTimer=28; shakeAmt=14; }
spawnParticles(mq.x, mq.y, won?’#ff8844’:’#ff4400’, 18);
spawnParticles(mq.x, mq.y, won?’#ffcc66’:’#ffcc00’, 10);
if (won) playVictory(); else playGameOver();
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*t;}
function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
function rnd(a,b){return a+Math.random()*(b-a);}

function spawnParticles(x,y,color,n){
for(let i=0;i<n;i++){
const a=Math.random()*Math.PI*2, sp=rnd(2,6);
particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:1,color,r:rnd(2,4)});
}
}
function spawnFloater(x,y,text,color){
floaters.push({x,y,text,color,life:1,vy:-1.3});
}

// ─────────────────────────────────────────────
//  SPAWNERS
// ─────────────────────────────────────────────
function spawnHand() {
const ang = Math.random()*Math.PI*2;
const tx = Math.max(48,Math.min(W-48, mq.x+Math.cos(ang)*rnd(20,90)));
const ty = Math.max(70,Math.min(H-70, mq.y+Math.sin(ang)*rnd(20,90)));
const edge=Math.floor(Math.random()*4);
let sx,sy;
if(edge===0){sx=tx;sy=-110;}
else if(edge===1){sx=tx;sy=H+110;}
else if(edge===2){sx=-110;sy=ty;}
else{sx=W+110;sy=ty;}
const strikeSpeed=Math.min(32,17+difficulty*3.2);
const wait=Math.max(8,Math.round(rnd(24,50)-difficulty*4));
hands.push({x:sx,y:sy,tx,ty,sx,sy,state:‘wait’,waitTimer:wait,
strikeSpeed,holdTimer:0,retractTimer:0,alpha:1,
angle:Math.atan2(ty-sy,tx-sx)});
playWhoosh(0.8+Math.random()*0.4);
}

function spawnBag() {
const m=52;
bags.push({x:rnd(m,W-m),y:rnd(m+44,H-m),r:14,pulse:Math.random()*Math.PI*2,age:0});
}

// ─────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────
function update() {
if(state!==‘play’) return;
frame++;

const elapsed=(Date.now()-startTime)/1000;
timeLeft=Math.max(0,GAME_DURATION-elapsed);
difficulty=elapsed/40;
handInterval=Math.max(28,130-difficulty*75);
bagInterval =Math.max(52,200-difficulty*85);

if(timeLeft<=0){endGame(true);return;}

// Mosquito
const px=mq.x, py=mq.y;
mq.x=lerp(mq.x,mx,0.13);
mq.y=lerp(mq.y,my,0.13);
mq.wingAnim+=0.55;
const moved=dist(mq.x,mq.y,px,py);
mq.speed=lerp(mq.speed,moved,0.22);

if(mq.speed>0.35){
if(!buzzActive) startBuzz();
setBuzzVol(Math.min(1,mq.speed/2.5));
} else {
if(buzzActive) stopBuzz(false);
}

// Spawn hands
handSpawnT++;
if(handSpawnT>=handInterval){
handSpawnT=0; spawnHand();
if(difficulty>0.8&&Math.random()<0.35) spawnHand();
}

// Spawn bags
bagSpawnT++;
if(bagSpawnT>=bagInterval){
bagSpawnT=0; spawnBag();
if(difficulty>1.2&&Math.random()<0.4) spawnBag();
}

// Collect bags
for(let i=bags.length-1;i>=0;i–){
const b=bags[i];
b.pulse+=0.07; b.age++;
if(dist(mq.x,mq.y,b.x,b.y)<mq.r+b.r){
bags.splice(i,1);
score+=BAG_PTS; bagsCount++;
playPickup();
spawnParticles(b.x,b.y,’#cc0022’,10);
spawnParticles(b.x,b.y,’#ff6688’,6);
spawnFloater(b.x,b.y-12,’+’+BAG_PTS,’#ff4466’);
}
}

// Update hands
for(let i=hands.length-1;i>=0;i–){
const h=hands[i];
if(h.state===‘wait’){
h.waitTimer–;
h.x=lerp(h.x,h.tx,0.045); h.y=lerp(h.y,h.ty,0.045);
if(h.waitTimer<=0) h.state=‘strike’;
} else if(h.state===‘strike’){
const dx=h.tx-h.x, dy=h.ty-h.y, d=Math.sqrt(dx*dx+dy*dy);
if(d<h.strikeSpeed){
h.x=h.tx; h.y=h.ty; h.state=‘hold’; h.holdTimer=16;
if(dist(h.x,h.y,mq.x,mq.y)<mq.r+26){
playSlap(); endGame(false); return;
} else if(dist(h.x,h.y,mq.x,mq.y)<68){
playNearMiss();
}
} else {
h.x+=(dx/d)*h.strikeSpeed; h.y+=(dy/d)*h.strikeSpeed;
}
} else if(h.state===‘hold’){
if(–h.holdTimer<=0){h.state=‘retract’;h.retractTimer=28;}
} else if(h.state===‘retract’){
h.x=lerp(h.x,h.sx,0.1); h.y=lerp(h.y,h.sy,0.1);
h.alpha=lerp(h.alpha,0,0.09);
if(–h.retractTimer<=0) hands.splice(i,1);
}
}

// Particles
for(let i=particles.length-1;i>=0;i–){
const p=particles[i];
p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.038;
if(p.life<=0) particles.splice(i,1);
}
// Floaters
for(let i=floaters.length-1;i>=0;i–){
const f=floaters[i];
f.y+=f.vy; f.life-=0.028;
if(f.life<=0) floaters.splice(i,1);
}

if(shakeTimer>0){shakeTimer–;shakeAmt=shakeTimer*0.5;}
}

// ─────────────────────────────────────────────
//  DRAW HELPERS
// ─────────────────────────────────────────────
function drawBg(){
const g=ctx.createRadialGradient(W/2,H/2,40,W/2,H/2,Math.max(W,H)*0.85);
g.addColorStop(0,’#fffaed’); g.addColorStop(1,’#f0d8a8’);
ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
ctx.strokeStyle=‘rgba(180,140,80,0.1)’; ctx.lineWidth=1;
for(let x=0;x<W;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
for(let y=0;y<H;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function rr(x,y,w,h,r){
r=Math.min(r,w/2,h/2);
ctx.beginPath();
ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
ctx.closePath();
}
if(!CanvasRenderingContext2D.prototype.roundRect)
CanvasRenderingContext2D.prototype.roundRect=rr;

function drawHandShape(){
const skin=’#f5c09a’,line=’#c07040’,dark=’#d4956a’;
ctx.fillStyle=skin; ctx.strokeStyle=line; ctx.lineWidth=1.5;
rr(-22,-10,44,38,8); ctx.fill(); ctx.stroke();
rr(-32,0,14,22,7);   ctx.fill(); ctx.stroke();
[[-16,11],[-5,12],[7,11],[18,10]].forEach(([fx,fw])=>{
rr(fx,-32,fw,30,5); ctx.fill(); ctx.stroke();
ctx.strokeStyle=dark; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(fx+2,-14); ctx.lineTo(fx+fw-2,-14); ctx.stroke();
ctx.strokeStyle=line; ctx.lineWidth=1.5;
});
ctx.strokeStyle=dark; ctx.lineWidth=1;
ctx.beginPath(); ctx.moveTo(-10,8); ctx.quadraticCurveTo(0,18,10,8); ctx.stroke();
}

function drawHand(h){
ctx.save(); ctx.globalAlpha=h.alpha;
ctx.translate(h.x,h.y); ctx.rotate(h.angle+Math.PI/2);
drawHandShape(); ctx.restore();
}

function drawMosquito(x,y){
ctx.save(); ctx.translate(x,y);
const bob=Math.sin(frame*0.045)*1.5;
ctx.translate(0,bob);
const flap=Math.sin(mq.wingAnim)*0.45;

// Wings
[[-7,-0.3+flap,-0.5],[7,0.3-flap,0.5]].forEach(([wx,rot,tilt])=>{
ctx.save(); ctx.rotate(rot);
ctx.fillStyle=‘rgba(185,220,255,0.55)’;
ctx.strokeStyle=‘rgba(120,180,220,0.7)’; ctx.lineWidth=0.7;
ctx.beginPath(); ctx.ellipse(wx,-4,11,5.5,tilt,0,Math.PI*2);
ctx.fill(); ctx.stroke(); ctx.restore();
});
// Body
ctx.fillStyle=’#111’;
ctx.beginPath(); ctx.ellipse(0,0,5,9,0,0,Math.PI*2); ctx.fill();
ctx.strokeStyle=’#3a3a3a’; ctx.lineWidth=0.8;
[-4,-1,2,5].forEach(sy=>{ ctx.beginPath(); ctx.moveTo(-4,sy); ctx.lineTo(4,sy); ctx.stroke(); });
// Head
ctx.fillStyle=’#111’;
ctx.beginPath(); ctx.arc(0,-11,5,0,Math.PI*2); ctx.fill();
ctx.fillStyle=’#ff2200’;
ctx.beginPath(); ctx.arc(2,-12,1.8,0,Math.PI*2); ctx.fill();
ctx.fillStyle=’#ff8866’;
ctx.beginPath(); ctx.arc(2.6,-12.5,0.6,0,Math.PI*2); ctx.fill();
// Proboscis
ctx.strokeStyle=’#222’; ctx.lineWidth=1.2;
ctx.beginPath(); ctx.moveTo(0,-15); ctx.lineTo(0,-24); ctx.stroke();
// Legs
ctx.strokeStyle=’#333’; ctx.lineWidth=0.8;
[[-1,0],[-1,3],[1,6]].forEach(([ix,iy])=>{
ctx.beginPath(); ctx.moveTo(ix*3,iy); ctx.lineTo(ix*3-10,iy+7); ctx.stroke();
ctx.beginPath(); ctx.moveTo(-ix*3,iy); ctx.lineTo(-ix*3+10,iy+7); ctx.stroke();
});
ctx.restore();
}

function drawBloodBag(b){
ctx.save(); ctx.translate(b.x,b.y);
const pulse=Math.sin(b.pulse)*0.11+1;
ctx.scale(pulse,pulse);
// Glow
const grd=ctx.createRadialGradient(0,0,4,0,0,24);
grd.addColorStop(0,‘rgba(200,0,30,0.28)’); grd.addColorStop(1,‘rgba(200,0,30,0)’);
ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(0,0,24,0,Math.PI*2); ctx.fill();
// Bag
ctx.fillStyle=’#cc0022’; ctx.strokeStyle=’#800010’; ctx.lineWidth=1.5;
rr(-7,-10,14,18,4); ctx.fill(); ctx.stroke();
// Tube
ctx.fillStyle=’#aa0018’; rr(-2,-14,4,6,2); ctx.fill(); ctx.stroke();
// Highlight
ctx.fillStyle=‘rgba(255,100,100,0.35)’; rr(-5,-8,5,12,2); ctx.fill();
// Cross
ctx.fillStyle=‘rgba(255,255,255,0.75)’;
ctx.fillRect(-1,-7,2,8); ctx.fillRect(-4,-4,8,2);
ctx.restore();
}

function drawParticlesFloaters(){
particles.forEach(p=>{
ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
ctx.restore();
});
floaters.forEach(f=>{
ctx.save(); ctx.globalAlpha=Math.max(0,f.life);
ctx.fillStyle=f.color; ctx.font=‘bold 16px Georgia,serif’;
ctx.textAlign=‘center’; ctx.fillText(f.text,f.x,f.y); ctx.restore();
});
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
function drawHUD(){
const pad=10;
// Timer bar bg
ctx.fillStyle=‘rgba(0,0,0,0.2)’; rr(pad,pad,W-pad*2,18,5); ctx.fill();
// Timer fill
const pct=timeLeft/GAME_DURATION;
const urgency=pct<0.2?0.5+0.5*Math.sin(frame*0.25):1;
const hue=Math.floor(pct*120);
ctx.fillStyle=`hsla(${hue},80%,42%,${urgency})`;
rr(pad,pad,(W-pad*2)*pct,18,5); ctx.fill();
// Timer text
ctx.fillStyle=’#fff’; ctx.font=‘bold 12px Georgia,serif’; ctx.textAlign=‘center’;
ctx.fillText(Math.ceil(timeLeft)+‘s’,W/2,pad+13);

// Score
ctx.fillStyle=‘rgba(0,0,0,0.18)’; rr(pad,34,112,40,7); ctx.fill();
ctx.fillStyle=’#4a1a00’; ctx.font=‘bold 11px Georgia,serif’; ctx.textAlign=‘left’;
ctx.fillText(‘SCORE’,pad+8,50);
ctx.font=‘bold 20px Georgia,serif’; ctx.fillText(score,pad+8,67);

// Bags
ctx.fillStyle=‘rgba(0,0,0,0.18)’; rr(W-118-pad,34,118,40,7); ctx.fill();
ctx.fillStyle=’#4a1a00’; ctx.font=‘bold 11px Georgia,serif’; ctx.textAlign=‘right’;
ctx.fillText(‘BAGS’,W-pad-8,50);
ctx.font=‘bold 20px Georgia,serif’; ctx.fillText(’🩸 ’+bagsCount,W-pad-8,67);
}

// ─────────────────────────────────────────────
//  SCREENS
// ─────────────────────────────────────────────
function drawStart(){
drawBg();
// Ghost hands
[[W-55,65,0.55,0.68],[55,H-90,-0.3,0.55]].forEach(([tx,ty,rot,sc])=>{
ctx.save(); ctx.globalAlpha=0.13; ctx.translate(tx,ty); ctx.rotate(rot); ctx.scale(sc,sc);
drawHandShape(); ctx.restore();
});
ctx.textAlign=‘center’;
ctx.fillStyle=’#7a3010’; ctx.font=‘bold 36px Georgia,serif’; ctx.fillText(“DON’T GET”,W/2+2,H/2-92);
ctx.font=‘bold 54px Georgia,serif’; ctx.fillText(“SLAPPED!”,W/2+2,H/2-42);
ctx.fillStyle=’#cc2200’; ctx.font=‘bold 36px Georgia,serif’; ctx.fillText(“DON’T GET”,W/2,H/2-94);
ctx.fillStyle=’#ff3300’; ctx.font=‘bold 54px Georgia,serif’; ctx.fillText(“SLAPPED!”,W/2,H/2-44);

drawMosquito(W/2, H/2+26);

ctx.fillStyle=’#5a2800’; ctx.font=‘15px Georgia,serif’;
[‘🦟  Dodge the slapping hands’,‘🩸  Collect blood bags for points’,‘⏱  Survive 60 seconds’].forEach((l,i)=>{
ctx.fillText(l,W/2,H/2+82+i*25);
});

ctx.fillStyle=’#cc2200’; rr(W/2-80,H/2+164,160,48,10); ctx.fill();
ctx.fillStyle=’#fff’; ctx.font=‘bold 22px Georgia,serif’; ctx.fillText(‘PLAY’,W/2,H/2+195);
}

function drawPlay(){
drawBg();

// Blood bags
bags.forEach(b=>{
const p2=0.5+0.5*Math.sin(b.pulse*2);
ctx.save(); ctx.globalAlpha=0.1+p2*0.08;
ctx.strokeStyle=’#cc0022’; ctx.lineWidth=2;
ctx.beginPath(); ctx.arc(b.x,b.y,b.r+12+p2*6,0,Math.PI*2); ctx.stroke();
ctx.restore();
drawBloodBag(b);
});

// Hands
hands.forEach(h=>{
if(h.state===‘wait’){
const p=0.5+0.5*Math.sin(frame*0.22);
ctx.save(); ctx.globalAlpha=0.15*h.alpha; ctx.fillStyle=’#ff2200’;
ctx.beginPath(); ctx.arc(h.tx,h.ty,30,0,Math.PI*2); ctx.fill(); ctx.restore();
ctx.save(); ctx.globalAlpha=p*0.28*h.alpha; ctx.strokeStyle=’#ff2200’; ctx.lineWidth=2;
ctx.beginPath(); ctx.arc(h.tx,h.ty,26+p*9,0,Math.PI*2); ctx.stroke(); ctx.restore();
}
drawHand(h);
});

drawMosquito(mq.x,mq.y);
drawParticlesFloaters();
drawHUD();
}

function drawOver(){
drawBg();
[[W/2+90,H/2-55,0.8,1.4],[W/2-110,H/2+25,-0.4,1.2]].forEach(([tx,ty,rot,sc])=>{
ctx.save(); ctx.globalAlpha=0.09; ctx.translate(tx,ty); ctx.rotate(rot); ctx.scale(sc,sc);
drawHandShape(); ctx.restore();
});
drawParticlesFloaters();
ctx.textAlign=‘center’;

if(survived){
ctx.fillStyle=’#cc7700’; ctx.font=‘bold 44px Georgia,serif’;
ctx.shadowColor=’#ffaa00’; ctx.shadowBlur=16;
ctx.fillText(‘YOU SURVIVED!’,W/2,H/2-100); ctx.shadowBlur=0;
} else {
ctx.fillStyle=’#cc2200’; ctx.font=‘bold 54px Georgia,serif’;
ctx.shadowColor=’#ff6600’; ctx.shadowBlur=14;
ctx.fillText(‘SLAPPED!’,W/2,H/2-100); ctx.shadowBlur=0;
}

ctx.fillStyle=‘rgba(0,0,0,0.1)’; rr(W/2-115,H/2-76,230,114,12); ctx.fill();
ctx.fillStyle=’#4a1a00’; ctx.font=‘17px Georgia,serif’; ctx.fillText(‘Final Score’,W/2,H/2-50);
ctx.fillStyle=’#cc2200’; ctx.font=‘bold 50px Georgia,serif’; ctx.fillText(score,W/2,H/2+6);
ctx.fillStyle=’#4a1a00’; ctx.font=‘15px Georgia,serif’;
ctx.fillText(‘🩸 ‘+bagsCount+’ blood bag’+(bagsCount!==1?‘s’:’’)+’ collected’,W/2,H/2+32);

let rating;
if(!survived) rating=“Couldn’t dodge ’em all…”;
else if(score<30) rating=‘Mosquito in training 🦟’;
else if(score<80) rating=‘Sneaky little bug!’;
else if(score<160) rating=‘Slippery critter! 💉’;
else if(score<260) rating=‘Master bloodsucker! 🏆’;
else rating=‘LEGENDARY MOSQUITO 👑’;

ctx.fillStyle=’#7a3010’; ctx.font=‘italic 16px Georgia,serif’; ctx.fillText(rating,W/2,H/2+64);

ctx.fillStyle=’#cc2200’; rr(W/2-90,H/2+86,180,50,10); ctx.fill();
ctx.fillStyle=’#fff9ec’; ctx.font=‘bold 22px Georgia,serif’; ctx.fillText(‘TRY AGAIN’,W/2,H/2+118);
}

// ─────────────────────────────────────────────
//  RENDER & LOOP
// ─────────────────────────────────────────────
function render(){
ctx.clearRect(0,0,W,H);
let sx=0,sy=0;
if(shakeTimer>0){sx=(Math.random()-0.5)*shakeAmt;sy=(Math.random()-0.5)*shakeAmt;shakeAmt*=0.88;}
ctx.save(); ctx.translate(sx,sy);
if(state===‘start’) drawStart();
else if(state===‘play’) drawPlay();
else if(state===‘over’) drawOver();
ctx.restore();
}

function loop(){ update(); render(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
